<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style> body { background-color: #f4f9f4; display: flex; align-items: center; justify-content: center; height: 100vh; } </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
                    <div class="card-header bg-success text-white text-center p-4 border-0">
                        <h4 class="mb-0 fw-bold">Buat Akun Baru</h4>
                        <small>Bergabunglah menjadi pahlawan lingkungan</small>
                    </div>
                    <div class="card-body p-4">
                        <form action="/register" method="POST">
                            <div class="mb-3">
                                <label class="form-label text-muted fw-bold">Nama Lengkap</label>
                                <input type="text" name="name" class="form-control form-control-lg bg-light border-0" placeholder="Nama Kamu" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-muted fw-bold">Alamat Email</label>
                                <input type="email" name="email" class="form-control form-control-lg bg-light border-0" placeholder="contoh@email.com" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label text-muted fw-bold">Kata Sandi</label>
                                <input type="password" name="password" class="form-control form-control-lg bg-light border-0" placeholder="••••••••" required>
                            </div>
                            <button type="submit" class="btn btn-success w-100 btn-lg rounded-pill fw-bold shadow-sm">Daftar Sekarang</button>
                        </form>
                    </div>
                    <div class="card-footer bg-white text-center border-0 pb-4">
                        <span class="text-muted">Sudah punya akun? <a href="/login" class="text-success fw-bold text-decoration-none">Masuk di sini</a></span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
